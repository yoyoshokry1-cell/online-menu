                /><div class="item-info">

                </div></article><article class="menu-item">

                    class="photo"

                /><div class="item-info">
                    <header>
                        <h4>Chicken</h4>

                    </header>
                    <p class="item-text">Fried chicken with BBQ sauce</p>
                </div></article></div></section><script src="main.js"></script>
</body>
</html>
